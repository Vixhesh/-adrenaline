{% extends "base.html" %}
{% block content %}

<style>
.otp-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:60vh;
}

.otp-card{
    background:#f8f9fa;
    padding:40px;
    border-radius:15px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fadeIn .6s ease;
}

.otp-input{
    letter-spacing:8px;
    font-size:22px;
    text-align:center;
}
</style>

<div class="otp-wrapper">
    <div class="otp-card text-center">

        <h4 class="mb-3">Verify OTP</h4>
        <p class="text-muted">Check your email</p>

        <form method="POST">
            <input type="text"
                   name="otp"
                   maxlength="6"
                   class="form-control otp-input mb-4"
                   placeholder="------"
                   required>

            <button class="btn btn-success w-100">
                Verify OTP
            </button>
        </form>

    </div>
</div>

{% endblock %}
