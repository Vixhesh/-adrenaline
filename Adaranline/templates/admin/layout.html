<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    min-height:100vh;
    overflow-x:hidden;
}

.sidebar {
    width:250px;
    height:100vh;
    position:fixed;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(15px);
    padding:20px;
    transition:0.4s ease;
}

.sidebar a {
    display:block;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover {
    background:#0d6efd;
    transform:translateX(5px);
}

.content {
    margin-left:270px;
    padding:40px;
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card-custom {
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border:none;
    border-radius:15px;
    transition:0.3s;
}

.card-custom:hover {
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="sidebar">
    <h4>⚙ Admin</h4>
<a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
<a href="{{ url_for('admin.products') }}">Products</a>
<a href="{{ url_for('admin.orders') }}">Orders</a>
<a href="{{ url_for('admin.users') }}">Users</a>
<a href="{{ url_for('admin.login_activity') }}">Login Activity</a>
<a href="{{ url_for('admin.logout') }}" class="text-danger">Logout</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<script>
document.querySelectorAll(".sidebar a").forEach(link=>{
    link.addEventListener("mouseover",()=>link.style.letterSpacing="1px");
    link.addEventListener("mouseout",()=>link.style.letterSpacing="0px");
});
document.addEventListener("DOMContentLoaded", function () {
    const passwordFields = document.querySelectorAll("input[type='password']");

    passwordFields.forEach((field, index) => {

         
        const wrapper = document.createElement("div");
        wrapper.classList.add("password-wrapper");
        field.parentNode.insertBefore(wrapper, field);
        wrapper.appendChild(field);

        
        const icon = document.createElement("i");
        icon.classList.add("bi", "bi-eye");
        icon.id = "toggle-" + index;
        wrapper.appendChild(icon);

        
        icon.addEventListener("click", () => {
            const isHidden = field.type === "password";
            field.type = isHidden ? "text" : "password";
            icon.classList.toggle("bi-eye");
            icon.classList.toggle("bi-eye-slash");
        });
    });
});
</script>

</body>
</html>
